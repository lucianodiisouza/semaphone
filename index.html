<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semaphore</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app" data-tauri-drag-region>
      <div class="housing" data-tauri-drag-region>
        <div class="light red" data-light="red"></div>
        <div class="light yellow" data-light="yellow"></div>
        <div class="light green active" data-light="green"></div>
      </div>
      <button id="settings-btn" class="settings-btn" title="Settings">⚙</button>
    </div>
    <dialog id="settings-dialog">
      <form method="dialog" id="settings-form">
        <h2 id="settings-title">Settings</h2>
        <label>
          <span id="label-theme">Theme</span>
          <select id="theme-select">
            <option value="classic">Classic</option>
            <option value="minimal">Minimal</option>
            <option value="neon">Neon</option>
          </select>
        </label>
        <label>
          <span id="label-language">Language</span>
          <select id="locale-select">
            <option value="en">English</option>
            <option value="pt-BR">Português</option>
          </select>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="stealth-checkbox" />
          <span id="label-stealth">Stealth mode (hide from screen share)</span>
        </label>
        <fieldset>
          <legend id="label-connect">Connect tools</legend>
          <button type="button" id="connect-cursor">Cursor</button>
          <button type="button" id="connect-claude">Claude Code</button>
          <button type="button" id="connect-codex">Codex</button>
          <button type="button" id="connect-gemini">Gemini CLI</button>
          <button type="button" id="connect-copilot">Copilot CLI</button>
          <button type="button" id="connect-all">All</button>
        </fieldset>
        <p id="stealth-note" class="note"></p>
        <menu>
          <button value="cancel" id="btn-cancel">Cancel</button>
          <button value="default" id="btn-save">Save</button>
        </menu>
      </form>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
